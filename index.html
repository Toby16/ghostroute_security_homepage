<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #7c3aed;
    --purple-soft: #a78bfa;
    --purple-dim: rgba(124, 58, 237, 0.15);
    --white: #ffffff;
    --grey: rgba(255,255,255,0.45);
    --grey-dim: rgba(255,255,255,0.12);
  }

  html, body {
    height: 100%;
    background: #000;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Satellite background */
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/mnt/user-data/uploads/1000170022.jpg');
    background-size: cover;
    background-position: center top;
    opacity: 0.18;
    filter: saturate(0.6);
  }

  /* Radial vignette over the bg */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, transparent 0%, rgba(0,0,0,0.7) 60%, #000 100%);
  }

  /* Purple atmospheric glow */
  .glow-orb {
    position: absolute;
    width: 600px;
    height: 600px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 50%;
  }

  /* Content layer */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
    max-width: 560px;
    width: 100%;
    gap: 0;
  }

  /* Live badge */
  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px 5px 10px;
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--purple-soft);
    background: rgba(124,58,237,0.08);
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Ghost logo */
  .ghost-wrap {
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .ghost-wrap img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(124,58,237,0.6));
  }

  /* Headline */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--white);
    margin-bottom: 18px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  h1 span {
    color: var(--purple-soft);
  }

  /* Subtext */
  p.sub {
    font-size: 15px;
    font-weight: 400;
    color: var(--grey);
    line-height: 1.65;
    max-width: 400px;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* $100 bonus card */
  .bonus-card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--grey-dim);
    border-radius: 16px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.25s ease both;
    backdrop-filter: blur(8px);
  }

  .bonus-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
  }

  .bonus-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--grey);
  }

  .bonus-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }

  .bonus-desc {
    font-size: 12px;
    color: var(--grey);
    margin-top: 2px;
  }

  .bonus-icon {
    width: 44px;
    height: 44px;
    background: var(--purple-dim);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  /* CTA */
  .cta {
    width: 100%;
    padding: 15px 24px;
    background: var(--purple);
    border: none;
    border-radius: 12px;
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(124,58,237,0.35);
    animation: fadeUp 0.6s 0.3s ease both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .cta:hover {
    background: #6d28d9;
    transform: translateY(-1px);
    box-shadow: 0 0 40px rgba(124,58,237,0.5);
  }

  .cta:active { transform: translateY(0); }

  /* Availability note */
  .avail {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.04em;
    animation: fadeUp 0.6s 0.35s ease both;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .avail::before,
  .avail::after {
    content: '';
    display: block;
    height: 1px;
    width: 32px;
    background: rgba(255,255,255,0.1);
  }

  /* Wordmark at bottom */
  .wordmark {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.06em;
    white-space: nowrap;
    z-index: 10;
  }

  .wordmark b {
    color: rgba(167,139,250,0.35);
    font-weight: 600;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .bonus-card { padding: 18px; }
    h1 { font-size: 32px; }
  }
</style>
</head>

    <p class="sub">Ghostroute is live. Sign up in one click and get $100 added directly to your account balance — no strings.</p>

      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1C4 1 1 4 1 7.5S4 14 7.5 14 14 11 14 7.5 11 1 7.5 1zm0 2a4.5 4.5 0 110 9 4.5 4.5 0 010-9z" fill="white" fill-opacity="0.6"/><circle cx="7.5" cy="7.5" r="2" fill="white"/></svg>
      Join Us — Get $100 instantly!
    </a>

    <p class="avail">Available in every country</p>

  <div class="wordmark"><b>Ghost</b>route · Security</div>
</div>
</body>
